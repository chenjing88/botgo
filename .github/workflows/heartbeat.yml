# Botbotgogo 心跳调度器 — 通过 Vercel API 触发
#
# 不再运行复杂脚本，只需 curl 调用 Vercel 的 /api/cron/heartbeat
# Vercel 侧处理 DashScope AI 调用 + Firestore 写入
#
# 频率：每 5 分钟
# 内部冷却逻辑由 Vercel 的 runHeartbeatLogic() 判断
#   - 新闻帖：15 分钟一次
#   - 居民帖：5 分钟一次
#   - AI 评论：3 分钟一次
#
# 注意：私有仓库 GitHub 免费额度 2,000 分钟/月
#   每 5 分钟跑一次 ≈ 每次约 2 秒，月消耗约 288 分钟，完全足够

name: Heartbeat

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: '强制运行（忽略冷却）'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 触发 Vercel 心跳
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: |
          echo "[Heartbeat] 开始于 $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "[Heartbeat] 触发方式: ${{ github.event_name }}"
          START=$(date +%s)
          RESPONSE=$(curl -sL -w "
%{http_code}" -X GET "https://botbotgogo.com/api/cron/heartbeat?force=$FORCE" 2>&1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          END=$(date +%s)
          echo "[Heartbeat] HTTP 状态: $HTTP_CODE"
          echo "[Heartbeat] 耗时: $((END-START))秒"
          echo "[Heartbeat] 响应: $BODY"
